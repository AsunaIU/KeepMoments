basePath: /
definitions:
  internal_presentation_http.AuthRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret123
        type: string
    type: object
  internal_presentation_http.ErrorResponse:
    properties:
      error:
        example: invalid json body
        type: string
    type: object
  internal_presentation_http.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  internal_presentation_http.RefreshRequest:
    properties:
      refresh_token:
        example: g1A2b3C4d5E6f7G8
        type: string
    type: object
  keepmoments_backend_internal_logic.AuthResponse:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      email:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
      user_id:
        type: integer
    type: object
  keepmoments_backend_internal_logic.FilledPage:
    properties:
      id:
        type: string
      slots:
        items:
          $ref: '#/definitions/keepmoments_backend_internal_logic.FilledSlot'
        type: array
    type: object
  keepmoments_backend_internal_logic.FilledSlot:
    properties:
      id:
        type: string
      photo_id:
        type: string
    type: object
  keepmoments_backend_internal_logic.FilledTemplate:
    properties:
      id:
        type: string
      pages:
        items:
          $ref: '#/definitions/keepmoments_backend_internal_logic.FilledPage'
        type: array
    type: object
  keepmoments_backend_internal_logic.HTTPValidationError:
    properties:
      detail:
        items:
          $ref: '#/definitions/keepmoments_backend_internal_logic.ValidationError'
        type: array
    type: object
  keepmoments_backend_internal_logic.PhotoDetails:
    properties:
      content_type:
        type: string
      created_at:
        type: string
      description_json:
        example: '{"camera":"iphone","tags":["travel"]}'
        type: string
      file_name:
        type: string
      id:
        type: integer
      object_key:
        type: string
      template_id:
        type: string
    type: object
  keepmoments_backend_internal_logic.ProcessPage:
    properties:
      id:
        type: string
      slots:
        items:
          $ref: '#/definitions/keepmoments_backend_internal_logic.ProcessSlot'
        type: array
    type: object
  keepmoments_backend_internal_logic.ProcessRequest:
    properties:
      max_photos:
        type: integer
      min_photos:
        type: integer
      photo_ids:
        items:
          type: string
        type: array
      template_id:
        type: string
      user_description:
        type: string
    type: object
  keepmoments_backend_internal_logic.ProcessResponse:
    properties:
      filled_template:
        $ref: '#/definitions/keepmoments_backend_internal_logic.FilledTemplate'
    type: object
  keepmoments_backend_internal_logic.ProcessSlot:
    properties:
      id:
        type: string
      photo_id:
        type: string
    type: object
  keepmoments_backend_internal_logic.ProcessTemplate:
    properties:
      id:
        type: string
      pages:
        items:
          $ref: '#/definitions/keepmoments_backend_internal_logic.ProcessPage'
        type: array
    type: object
  keepmoments_backend_internal_logic.TemplateDetails:
    properties:
      created_at:
        type: string
      id:
        type: string
      pages:
        items:
          $ref: '#/definitions/keepmoments_backend_internal_logic.ProcessPage'
        type: array
    type: object
  keepmoments_backend_internal_logic.ValidationError:
    properties:
      loc:
        items: {}
        type: array
      msg:
        type: string
      type:
        type: string
    type: object
info:
  contact: {}
  description: API for authentication, templates, and photos storage.
  title: KeepMoments Backend API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_presentation_http.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_presentation_http.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_presentation_http.AuthRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      summary: Register user
      tags:
      - auth
  /api/v1/photos:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Template ID
        in: formData
        name: template_id
        required: true
        type: string
      - description: Photo description JSON
        in: formData
        name: description_json
        type: string
      - description: Photo file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.PhotoDetails'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload photo
      tags:
      - photos
  /api/v1/photos/{id}:
    delete:
      parameters:
      - description: Photo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete photo
      tags:
      - photos
    get:
      parameters:
      - description: Photo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.PhotoDetails'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get photo metadata
      tags:
      - photos
  /api/v1/templates:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/keepmoments_backend_internal_logic.TemplateDetails'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List templates
      tags:
      - templates
    post:
      consumes:
      - application/json
      parameters:
      - description: Template payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/keepmoments_backend_internal_logic.ProcessTemplate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.TemplateDetails'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create template
      tags:
      - templates
  /api/v1/templates/{id}:
    delete:
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete template
      tags:
      - templates
    get:
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.TemplateDetails'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get template
      tags:
      - templates
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_presentation_http.HealthResponse'
      summary: Health check
      tags:
      - system
  /process:
    post:
      consumes:
      - application/json
      parameters:
      - description: Process request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/keepmoments_backend_internal_logic.ProcessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.ProcessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_presentation_http.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/keepmoments_backend_internal_logic.HTTPValidationError'
      summary: Process
      tags:
      - ml
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: Enter the access token with the `Bearer ` prefix, for example `Bearer
      eyJhbGciOi...`
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
