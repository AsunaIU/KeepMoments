services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      HTTP_PORT: ${HTTP_PORT:-8080}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-keepmoments}
      POSTGRES_USER: ${POSTGRES_USER:-keepmoments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keepmoments}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-keepmoments}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-super-secret-change-me}
      AUTH_ACCESS_TOKEN_TTL_MINUTES: ${AUTH_ACCESS_TOKEN_TTL_MINUTES:-15}
      AUTH_REFRESH_TOKEN_TTL_HOURS: ${AUTH_REFRESH_TOKEN_TTL_HOURS:-720}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keepmoments}
      POSTGRES_USER: ${POSTGRES_USER:-keepmoments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keepmoments}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keepmoments} -d ${POSTGRES_DB:-keepmoments}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9200:9000"
      - "9201:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
